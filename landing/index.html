<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


  <script>
    const CONFIG = {
      DOMAIN: "https://stellarlend.com",
      GITHUB: "https://github.com/Smartdevs17/stellarlend-contracts",
      API_BASE: "",
      TWITTER: "@stellarlend"
    };
  </script>

  <title>StellarLend - Decentralized Lending on Stellar</title>
  <meta name="description" content="StellarLend is a decentralized lending protocol built on Stellar using Soroban smart contracts." />

  <!-- open graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="StellarLend - Decentralized Lending on Stellar">
  <meta property="og:description" content="Fast, transparent lending powered by Stellar blockchain. Borrow and lend globally.">
  <meta property="og:url" content="" id="og-url">
  <meta property="og:image" content="" id="og-image">
  <meta property="og:site_name" content="StellarLend">

  <!-- twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="StellarLend - Decentralized Lending on Stellar">
  <meta name="twitter:description" content="Fast, transparent lending powered by Stellar blockchain. Borrow and lend globally.">
  <meta name="twitter:image" content="" id="twitter-image">
  <meta name="twitter:site" content="" id="twitter-site">

  <!-- favicons -->
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <style>
    :root {
      --primary: #6366f1;
      --accent: #06b6d4;
      --bg: #0a0a1a;
      --bg-card: #111128;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #1e293b;
      --gradient: linear-gradient(135deg, #6366f1, #06b6d4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    nav {
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .nav-links { display: flex; gap: 1rem; }

    .btn {
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-primary { background: var(--gradient); color: #fff; }
    .btn-outline { border: 1px solid var(--border); color: var(--text); }

    .hero {
      text-align: center;
      padding: 5rem 2rem;
    }
  </style>
</head>

<body>

  <nav>
    <div>StellarLend</div>
    <div class="nav-links">
      <a href="#features">Features</a>
      <a id="github-link" class="btn btn-outline" target="_blank">GitHub</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Decentralized Lending on Stellar</h1>
    <p>Borrow and lend assets securely using smart contracts.</p>

    <div>
      <a id="github-btn" class="btn btn-primary" target="_blank">View on GitHub</a>
      <a id="api-btn" class="btn btn-outline" style="display:none;" target="_blank">Live API</a>
    </div>
  </section>

  <footer style="text-align:center; padding:2rem;">
    <a id="footer-github" target="_blank">GitHub</a> |
    <a id="footer-docs" target="_blank">Docs</a>
  </footer>

  <!-- Script -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // meta tags
      document.getElementById("og-url").content = CONFIG.DOMAIN;
      document.getElementById("og-image").content = CONFIG.DOMAIN + "/og-image.jpg";
      document.getElementById("twitter-image").content = CONFIG.DOMAIN + "/og-image.jpg";
      document.getElementById("twitter-site").content = CONFIG.TWITTER;

      // gitHub links
      document.getElementById("github-link").href = CONFIG.GITHUB;
      document.getElementById("github-btn").href = CONFIG.GITHUB;
      document.getElementById("footer-github").href = CONFIG.GITHUB;
      document.getElementById("footer-docs").href = CONFIG.GITHUB + "/tree/main/docs";

    });
  </script>

</body>
</html>
