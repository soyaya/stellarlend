version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    restart: unless-stopped

  oracle:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    env_file:
      - ./oracle/.env
    restart: unless-stopped